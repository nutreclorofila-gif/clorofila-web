[[redirects]]
  from = "http://clorofila.uy/*"
  to   = "https://clorofila.uy/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.clorofila.uy/*"
  to   = "https://clorofila.uy/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "https://www.clorofila.uy/*"
  to   = "https://clorofila.uy/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/shared.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[build]
  publish = "."
